<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Kids Planet — Instagram Ad (seats)</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

body { width: 1080px; height: 1080px; }
.card { width: 1080px; height: 1080px; background: linear-gradient(135deg, #3d1010 0%, #8b1a1a 50%, #c62828 100%); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; padding: 72px; color: white; }
.card::before { content: ''; position: absolute; top: -200px; right: -200px; width: 500px; height: 500px; border-radius: 50%; background: rgba(255,255,255,0.03); }
.card::after { content: ''; position: absolute; bottom: -150px; left: -150px; width: 400px; height: 400px; border-radius: 50%; background: rgba(255,255,255,0.02); }
.top { position: relative; z-index: 1; }
.logo { display: flex; align-items: center; gap: 20px; margin-bottom: 48px; }
.logo-icon { width: 72px; height: 72px; background: #c8a84e; color: #1a3a1a; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 28px; }
.logo-name { font-size: 32px; font-weight: 800; }
.logo-sub { font-size: 14px; opacity: 0.7; letter-spacing: 1px; }
.badge { display: inline-block; background: #c8a84e; color: #1a3a1a; font-size: 14px; font-weight: 700; padding: 8px 24px; border-radius: 30px; letter-spacing: 3px; margin-bottom: 32px; }
.middle { position: relative; z-index: 1; flex: 1; display: flex; align-items: center; }
.headline { font-size: 72px; font-weight: 800; line-height: 1.1; }
.headline span { color: #e0c878; }
.bottom { position: relative; z-index: 1; }
.subtitle { font-size: 22px; opacity: 0.85; line-height: 1.5; margin-bottom: 36px; max-width: 700px; }
.cta { display: inline-block; background: #c8a84e; color: #1a3a1a; font-size: 20px; font-weight: 700; padding: 18px 44px; border-radius: 14px; }
.stats-row { display: flex; gap: 32px; margin-top: 32px; }
.stat-pill { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 20px; text-align: center; }
.stat-pill-value { font-size: 22px; font-weight: 800; }
.stat-pill-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
</style></head>
<body>
<div class="card">
  <div class="top">
    <div class="logo">
      <div class="logo-icon">KP</div>
      <div><div class="logo-name">Kids Planet</div><div class="logo-sub">Kullu Valley · Since 2010</div></div>
    </div>
    <div class="badge">LIMITED SEATS</div>
  </div>
  <div class="middle">
    <div class="headline">Seats Are<br><span>Filling Fast</span></div>
  </div>
  <div class="bottom">
    <div class="subtitle">Only a few spots left for Playgroup & Nursery</div>
    <div class="cta">Don't Wait — Inquire Now</div>
    <div class="stats-row">
      <div class="stat-pill"><div class="stat-pill-value">15+</div><div class="stat-pill-label">Years</div></div>
      <div class="stat-pill"><div class="stat-pill-value">20:1</div><div class="stat-pill-label">Ratio</div></div>
      <div class="stat-pill"><div class="stat-pill-value">4.4★</div><div class="stat-pill-label">Rating</div></div>
      <div class="stat-pill"><div class="stat-pill-value">13</div><div class="stat-pill-label">Classrooms</div></div>
    </div>
  </div>
</div>
</body></html>
