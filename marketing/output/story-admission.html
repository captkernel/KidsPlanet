<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Kids Planet — Story (admission)</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

body { width: 1080px; height: 1920px; }
.story { width: 1080px; height: 1920px; background: linear-gradient(180deg, #1a3a1a 0%, #2d5016 40%, #4a7c28 100%); position: relative; overflow: hidden; display: flex; flex-direction: column; padding: 80px 72px; color: white; }
.story::before { content: ''; position: absolute; top: 300px; right: -100px; width: 400px; height: 400px; border-radius: 50%; background: rgba(255,255,255,0.03); }
.logo { display: flex; align-items: center; gap: 20px; margin-bottom: 60px; }
.logo-icon { width: 64px; height: 64px; background: #c8a84e; color: #1a3a1a; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 26px; }
.logo-name { font-size: 30px; font-weight: 800; }
.logo-sub { font-size: 13px; opacity: 0.7; }
.badge { display: inline-block; background: rgba(255,255,255,0.15); font-size: 14px; font-weight: 700; padding: 10px 28px; border-radius: 30px; letter-spacing: 3px; margin-bottom: 48px; }
.headline { font-size: 64px; font-weight: 800; line-height: 1.15; margin-bottom: 60px; }
.headline span { color: #e0c878; }
.features { flex: 1; }
.feature { font-size: 24px; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); opacity: 0.9; }
.bottom { margin-top: auto; text-align: center; }
.cta { display: inline-block; background: #c8a84e; color: #1a3a1a; font-size: 22px; font-weight: 700; padding: 22px 56px; border-radius: 16px; margin-bottom: 24px; }
.phone { font-size: 20px; opacity: 0.7; }
.swipe { font-size: 40px; margin-top: 20px; animation: bounce 2s infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style></head>
<body>
<div class="story">
  <div class="logo">
    <div class="logo-icon">KP</div>
    <div><div class="logo-name">Kids Planet</div><div class="logo-sub">Kullu Valley · Since 2010</div></div>
  </div>
  <div class="badge">ADMISSIONS OPEN 2026–27</div>
  <div class="headline">Give Your Child<br>the <span>Best Start</span><br>in Kullu Valley</div>
  <div class="features">
    <div class="feature">✓ Playgroup to Class 8</div>
    <div class="feature">✓ Small classes (20:1 ratio)</div>
    <div class="feature">✓ Play-based learning</div>
    <div class="feature">✓ 15+ years of trust</div>
  </div>
  <div class="bottom">
    <div class="cta">Swipe Up to Inquire</div>
    <div class="phone">+91 98180 97475</div>
    <div class="swipe">↑</div>
  </div>
</div>
</body></html>
